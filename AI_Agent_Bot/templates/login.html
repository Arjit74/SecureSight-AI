<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - SecureSight AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
    <style>
      .auth-body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 14px;
      }

      .dashboard-bg {
        --mouse-x: 50%;
        --mouse-y: 50%;
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        overflow: hidden;
        background:
          radial-gradient(1200px 760px at var(--mouse-x) var(--mouse-y), rgba(79, 172, 254, 0.22) 0%, rgba(79, 172, 254, 0) 62%),
          radial-gradient(900px 620px at 14% 16%, rgba(240, 147, 251, 0.14) 0%, rgba(240, 147, 251, 0) 58%),
          radial-gradient(980px 680px at 82% 88%, rgba(102, 126, 234, 0.14) 0%, rgba(102, 126, 234, 0) 63%),
          linear-gradient(145deg, #090e1d 0%, #111a2d 42%, #0b1325 100%);
      }

      .dashboard-bg::before {
        content: "";
        position: absolute;
        inset: -25%;
        background-image:
          linear-gradient(rgba(102, 126, 234, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(102, 126, 234, 0.07) 1px, transparent 1px);
        background-size: 72px 72px;
        background-position: -36px -36px;
        opacity: 0.5;
        transform: translate3d(calc((var(--mouse-x) - 50%) / -10), calc((var(--mouse-y) - 50%) / -10), 0);
        animation: dashboard-grid-pan 20s linear infinite;
      }

      .dashboard-bg::after {
        content: "";
        position: absolute;
        inset: -30%;
        background: conic-gradient(from 90deg at 50% 50%, rgba(102, 126, 234, 0.18), rgba(79, 172, 254, 0), rgba(240, 147, 251, 0.16), rgba(102, 126, 234, 0.18));
        filter: blur(80px);
        opacity: 0.45;
        animation: dashboard-haze-spin 26s linear infinite;
      }

      @keyframes dashboard-grid-pan {
        from { background-position: -36px -36px; }
        to { background-position: 36px 36px; }
      }

      @keyframes dashboard-haze-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .dashboard-bg-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.9;
      }

      .dashboard-models {
        position: absolute;
        inset: 0;
        z-index: 2;
      }

      .dashboard-model {
        position: absolute;
        transform: translate3d(var(--tx, 0px), var(--ty, 0px), 0) rotate(var(--rz, 0deg));
        transition: transform 160ms linear;
        border: 1px solid rgba(180, 212, 255, 0.22);
        background: linear-gradient(160deg, rgba(15, 32, 65, 0.42), rgba(22, 16, 53, 0.16));
        box-shadow: 0 24px 44px rgba(7, 12, 26, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
      }

      .model-core {
        top: 14%;
        right: 9%;
        width: min(280px, 28vw);
        aspect-ratio: 1;
        border-radius: 30%;
      }

      .model-ring {
        left: 6%;
        bottom: 12%;
        width: min(320px, 30vw);
        aspect-ratio: 1;
        border-radius: 50%;
        border-style: dashed;
        border-width: 2px;
        background: radial-gradient(circle at center, rgba(102, 126, 234, 0.12), rgba(102, 126, 234, 0));
      }

      .model-panel {
        left: 12%;
        top: 20%;
        width: min(200px, 20vw);
        height: min(110px, 12vw);
        border-radius: 16px;
      }

      .auth-shell {
        position: relative;
        z-index: 4;
        width: min(460px, 94vw);
      }

      .auth-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(102, 126, 234, 0.24);
        border-radius: 24px;
        padding: 34px 30px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(18px);
      }

      .auth-brand {
        text-align: center;
        margin-bottom: 24px;
      }

      .auth-brand .logo-mark {
        width: 70px;
        height: 70px;
        margin: 0 auto 14px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: grid;
        place-items: center;
        font-size: 34px;
        box-shadow: 0 14px 30px rgba(102, 126, 234, 0.45);
        animation: float 2.8s ease-in-out infinite;
      }

      .auth-brand h1 {
        margin: 0;
        font-size: 34px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent), #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .auth-brand .sub {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .field {
        margin-top: 14px;
      }

      .field label {
        display: block;
        font-size: 13px;
        color: #d6e4f3;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .field input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(153, 189, 236, 0.22);
        background: rgba(8, 18, 34, 0.55);
        color: #e7f1ff;
        font-family: inherit;
        font-size: 14px;
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
      }

      .field input::placeholder {
        color: #9eb3c7;
      }

      .field input:focus {
        border-color: rgba(79, 172, 254, 0.7);
        box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.16);
        transform: translateY(-1px);
      }

      .btn-login {
        width: 100%;
        margin-top: 18px;
        border: none;
        border-radius: 12px;
        padding: 13px 14px;
        font-size: 15px;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(135deg, #4facfe 0%, #667eea 50%, #764ba2 100%);
        cursor: pointer;
        box-shadow: 0 14px 28px rgba(76, 131, 219, 0.34);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 34px rgba(76, 131, 219, 0.45);
      }

      .error {
        margin: 14px 0 0;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        border: 1px solid rgba(255, 116, 116, 0.45);
        background: rgba(125, 16, 31, 0.28);
        color: #ffd3d9;
      }

      .demo {
        margin-top: 18px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(102, 126, 234, 0.26);
        background: rgba(11, 24, 46, 0.46);
      }

      .demo .title {
        font-size: 12px;
        font-weight: 700;
        color: #c6dcf4;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .demo .row {
        font-size: 13px;
        color: #dce9f8;
        margin-top: 5px;
      }

      @media (max-width: 640px) {
        .auth-card {
          padding: 26px 20px;
        }

        .auth-brand h1 {
          font-size: 28px;
        }

        .model-panel,
        .model-core {
          opacity: 0.65;
        }
      }
    </style>
  </head>
  <body class="auth-body">
    <div class="dashboard-bg" id="dashboardBg" aria-hidden="true">
      <canvas id="dashboardBackgroundCanvas" class="dashboard-bg-canvas"></canvas>
      <div class="dashboard-models">
        <div class="dashboard-model model-core" data-depth="0.08"></div>
        <div class="dashboard-model model-ring" data-depth="0.06"></div>
        <div class="dashboard-model model-panel" data-depth="0.1"></div>
      </div>
    </div>

    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-brand">
          <div class="logo-mark">🛡️</div>
          <h1>SecureSight AI</h1>
          <div class="sub">AI-Powered Security Analysis Dashboard</div>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus placeholder="Enter your username" />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password" />
          </div>

          <button type="submit" class="btn-login">Sign In Securely</button>
        </form>

        <div class="demo">
          <div class="title">Demo Credentials</div>
          <div class="row">Admin: <strong>admin</strong> / <strong>admin123</strong></div>
          <div class="row">User: <strong>user</strong> / <strong>user123</strong></div>
        </div>
      </section>
    </main>

    <script>
      (function initDashboardBackground() {
        const background = document.getElementById('dashboardBg');
        const canvas = document.getElementById('dashboardBackgroundCanvas');
        if (!background || !canvas) return;

        const context = canvas.getContext('2d');
        if (!context) return;

        const models = Array.from(background.querySelectorAll('.dashboard-model'));
        const isSmallScreen = window.matchMedia('(max-width: 768px)').matches;
        const particleCount = isSmallScreen ? 30 : 56;

        const pointer = {
          x: window.innerWidth * 0.5,
          y: window.innerHeight * 0.5,
          targetX: window.innerWidth * 0.5,
          targetY: window.innerHeight * 0.5
        };

        const particles = [];
        let viewportWidth = window.innerWidth;
        let viewportHeight = window.innerHeight;

        function resizeCanvas() {
          viewportWidth = window.innerWidth;
          viewportHeight = window.innerHeight;
          const dpr = Math.min(window.devicePixelRatio || 1, 2);

          canvas.width = Math.floor(viewportWidth * dpr);
          canvas.height = Math.floor(viewportHeight * dpr);
          context.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function createParticle() {
          return {
            x: Math.random() * viewportWidth,
            y: Math.random() * viewportHeight,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            size: Math.random() * 2 + 0.8,
            hue: Math.random() > 0.45 ? 216 : 296
          };
        }

        resizeCanvas();
        for (let i = 0; i < particleCount; i += 1) {
          particles.push(createParticle());
        }

        function updateBackgroundLight() {
          const mouseXPercent = (pointer.x / viewportWidth) * 100;
          const mouseYPercent = (pointer.y / viewportHeight) * 100;
          background.style.setProperty('--mouse-x', `${mouseXPercent.toFixed(2)}%`);
          background.style.setProperty('--mouse-y', `${mouseYPercent.toFixed(2)}%`);
        }

        function updateModels() {
          const normX = pointer.x / viewportWidth - 0.5;
          const normY = pointer.y / viewportHeight - 0.5;

          models.forEach((model, index) => {
            const depth = Number(model.dataset.depth || 0.08);
            const tx = normX * depth * 170;
            const ty = normY * depth * 170;
            const rz = (index % 2 === 0 ? 1 : -1) * normX * depth * 48;
            model.style.setProperty('--tx', `${tx.toFixed(2)}px`);
            model.style.setProperty('--ty', `${ty.toFixed(2)}px`);
            model.style.setProperty('--rz', `${rz.toFixed(2)}deg`);
          });
        }

        function drawParticles() {
          context.clearRect(0, 0, viewportWidth, viewportHeight);

          const pointerRadius = isSmallScreen ? 140 : 190;
          const pointerRadiusSq = pointerRadius * pointerRadius;

          for (let i = 0; i < particles.length; i += 1) {
            const particle = particles[i];
            const dx = pointer.x - particle.x;
            const dy = pointer.y - particle.y;
            const distanceSq = dx * dx + dy * dy;

            if (distanceSq < pointerRadiusSq) {
              const force = (1 - distanceSq / pointerRadiusSq) * 0.04;
              particle.vx += dx * force * 0.0017;
              particle.vy += dy * force * 0.0017;
            }

            particle.vx *= 0.986;
            particle.vy *= 0.986;
            particle.x += particle.vx;
            particle.y += particle.vy;

            if (particle.x < -20) particle.x = viewportWidth + 20;
            if (particle.x > viewportWidth + 20) particle.x = -20;
            if (particle.y < -20) particle.y = viewportHeight + 20;
            if (particle.y > viewportHeight + 20) particle.y = -20;
          }

          for (let i = 0; i < particles.length; i += 1) {
            const particle = particles[i];
            context.beginPath();
            context.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            context.fillStyle = `hsla(${particle.hue}, 90%, 73%, 0.52)`;
            context.fill();

            for (let j = i + 1; j < particles.length; j += 1) {
              const peer = particles[j];
              const dx = particle.x - peer.x;
              const dy = particle.y - peer.y;
              const distance = Math.sqrt(dx * dx + dy * dy);
              const linkDistance = isSmallScreen ? 84 : 120;

              if (distance < linkDistance) {
                const alpha = (1 - distance / linkDistance) * 0.22;
                context.beginPath();
                context.strokeStyle = `rgba(153, 199, 255, ${alpha.toFixed(3)})`;
                context.lineWidth = 0.65;
                context.moveTo(particle.x, particle.y);
                context.lineTo(peer.x, peer.y);
                context.stroke();
              }
            }
          }
        }

        function animate() {
          pointer.x += (pointer.targetX - pointer.x) * 0.12;
          pointer.y += (pointer.targetY - pointer.y) * 0.12;

          updateBackgroundLight();
          updateModels();
          drawParticles();

          requestAnimationFrame(animate);
        }

        window.addEventListener('pointermove', (event) => {
          pointer.targetX = event.clientX;
          pointer.targetY = event.clientY;
        });

        window.addEventListener('resize', () => {
          resizeCanvas();
          updateBackgroundLight();
        });

        animate();
      })();
    </script>
  </body>
</html>
