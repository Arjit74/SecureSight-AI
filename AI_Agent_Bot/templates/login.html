<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - SecureSight AI</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Animated background particles */
      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 1;
      }

      .particle {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        animation: float 20s infinite;
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0) translateX(0) scale(1);
          opacity: 0;
        }
        10% {
          opacity: 0.3;
        }
        90% {
          opacity: 0.3;
        }
        100% {
          transform: translateY(-100vh) translateX(100px) scale(1.5);
          opacity: 0;
        }
      }

      /* Login Container */
      .login-container {
        position: relative;
        z-index: 10;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        padding: 50px 45px;
        border-radius: 25px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        width: 420px;
        animation: slideUp 0.8s ease-out;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(50px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        animation: rotate3d 3s ease-in-out infinite;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }

      @keyframes rotate3d {
        0%, 100% {
          transform: perspective(400px) rotateY(0deg);
        }
        50% {
          transform: perspective(400px) rotateY(180deg);
        }
      }

      h1 {
        color: #333;
        font-size: 32px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        text-align: center;
        color: #666;
        font-size: 14px;
        margin-bottom: 35px;
      }

      .form-group {
        margin-bottom: 25px;
        position: relative;
      }

      label {
        display: block;
        color: #555;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 15px 20px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
        background: #f8f9fa;
        outline: none;
      }

      input:focus {
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        transform: translateY(-2px);
      }

      .btn-login {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .error {
        background: #fee;
        color: #c33;
        padding: 12px 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 14px;
        border-left: 4px solid #c33;
        animation: shake 0.5s ease;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }

      .info {
        text-align: center;
        margin-top: 25px;
        padding: 15px;
        background: #f0f4ff;
        border-radius: 10px;
        font-size: 13px;
        color: #667eea;
        border: 1px solid #667eea;
      }

      .info strong {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .credentials {
        text-align: left;
        margin-top: 10px;
      }

      .credentials div {
        padding: 5px 0;
      }

      /* Floating elements */
      .float-element {
        position: absolute;
        z-index: 3;
        animation: float-element 6s ease-in-out infinite;
      }

      @keyframes float-element {
        0%, 100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      .float-1 {
        top: 10%;
        left: 10%;
        font-size: 60px;
        opacity: 0.1;
        animation-delay: 0s;
      }

      .float-2 {
        top: 20%;
        right: 15%;
        font-size: 80px;
        opacity: 0.1;
        animation-delay: 2s;
      }

      .float-3 {
        bottom: 15%;
        left: 15%;
        font-size: 70px;
        opacity: 0.1;
        animation-delay: 4s;
      }

      .float-4 {
        bottom: 20%;
        right: 10%;
        font-size: 90px;
        opacity: 0.1;
        animation-delay: 1s;
      }
    </style>
  </head>
  <body>
    <!-- Animated Background Particles -->
    <div class="particles" id="particles"></div>

    <!-- Floating Background Elements -->
    <div class="float-element float-1">🔒</div>
    <div class="float-element float-2">🛡️</div>
    <div class="float-element float-3">🔐</div>
    <div class="float-element float-4">🔑</div>

    <!-- Animated 3D Background -->
    <canvas id="loginCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;"></canvas>

    <!-- Login Form -->
    <div class="login-container">
      <div class="logo">
        <div class="logo-icon">🔒</div>
        <h1>SecureSight AI</h1>
        <div class="subtitle">AI-Powered Security Analysis Platform</div>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus placeholder="Enter your username" />
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password" />
        </div>
        
        <button type="submit" class="btn-login">🔐 Sign In Securely</button>
      </form>

      <div class="info">
        <strong>Demo Credentials:</strong>
        <div class="credentials">
          <div>👤 Admin: <strong>admin</strong> / <strong>admin123</strong></div>
          <div>👤 User: <strong>user</strong> / <strong>user123</strong></div>
        </div>
      </div>
    </div>

    <script>
      // Animated Canvas Background
      const canvas = document.getElementById('loginCanvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      class SecurityNode {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 0.5;
          this.vy = (Math.random() - 0.5) * 0.5;
          this.size = Math.random() * 4 + 2;
          this.connections = [];
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
          if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
          ctx.fill();
        }
      }

      const nodes = [];
      for (let i = 0; i < 50; i++) {
        nodes.push(new SecurityNode());
      }

      function animate() {
        ctx.fillStyle = 'rgba(102, 126, 234, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        nodes.forEach((node, i) => {
          node.update();
          node.draw();

          nodes.forEach((otherNode, j) => {
            if (i !== j) {
              const dx = node.x - otherNode.x;
              const dy = node.y - otherNode.y;
              const dist = Math.sqrt(dx * dx + dy * dy);

              if (dist < 150) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 - dist / 750})`;
                ctx.lineWidth = 1;
                ctx.moveTo(node.x, node.y);
                ctx.lineTo(otherNode.x, otherNode.y);
                ctx.stroke();
              }
            }
          });
        });

        requestAnimationFrame(animate);
      }

      animate();

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      // Generate animated particles
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.width = Math.random() * 10 + 5 + 'px';
        particle.style.height = particle.style.width;
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = Math.random() * 20 + 15 + 's';
        particlesContainer.appendChild(particle);
      }

      // Add input animations
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('focus', function() {
          this.parentElement.style.transform = 'scale(1.02)';
        });
        input.addEventListener('blur', function() {
          this.parentElement.style.transform = 'scale(1)';
        });
      });
    </script>
  </body>
</html>
